<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow</title>
</head>
<body>
    <a href="/create/">Ajouter une tâche</a>
    <h1>Mes tâches</h1>
    {% if tasks %}
        <ul>
            {% for task in tasks %}
                <li>
                    <strong>{{ task.title }}</strong>
                    — {{ task.get_status_display }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Aucune tâche pour le moment.</p>
    {% endif %}
</body>
</html>
